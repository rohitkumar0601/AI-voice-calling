services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
      POSTGRES_DB: crm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://crm:crm@db:5432/crm
      CORS_ORIGINS: "*"
      # VAPI_SERVER_SECRET: change-me   # optional: match on the Vapi assistant
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_BASE: http://localhost:8000
      VITE_VAPI_PUBLIC_KEY: ${VITE_VAPI_PUBLIC_KEY:-}
      VITE_VAPI_ASSISTANT_ID: ${VITE_VAPI_ASSISTANT_ID:-}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
